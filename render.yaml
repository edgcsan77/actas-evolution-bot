services:
  - type: web
    name: actas-evolution-web
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: actas-evolution-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: actas-evolution-redis
          property: connectionString
      - key: EVOLUTION_BASE_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        sync: false
      - key: PROVIDER_API_URL
        sync: false
      - key: PROVIDER_API_TOKEN
        sync: false
      - key: HISTORY_DAYS
        value: "7"
      - key: REQUEST_TIMEOUT_MINUTES
        value: "10"

  - type: worker
    name: actas-evolution-worker
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "rq worker actas --url $REDIS_URL"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: actas-evolution-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: actas-evolution-redis
          property: connectionString
      - key: EVOLUTION_BASE_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        sync: false
      - key: PROVIDER_API_URL
        sync: false
      - key: PROVIDER_API_TOKEN
        sync: false
      - key: HISTORY_DAYS
        value: "7"
      - key: REQUEST_TIMEOUT_MINUTES
        value: "10"

  - type: cron
    name: actas-evolution-cleanup
    runtime: python
    plan: starter
    schedule: "0 */6 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m app.cleanup"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: actas-evolution-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: actas-evolution-redis
          property: connectionString

  - type: keyvalue
    name: actas-evolution-redis
    plan: starter
    ipAllowList: []

databases:
  - name: actas-evolution-db
    plan: starter